name: Claude Code Review

on:
  # Use pull_request_target to allow secrets access for fork PRs.
  # CI only runs after manual approval for neqo, for non-members of the repo.
  pull_request_target: # zizmor: ignore[dangerous-triggers] See rationale above.
    branches: ["main"]
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  claude-review-trusted:
    name: Claude Code Review
    if: >-
      !github.event.pull_request.draft &&
      github.event.pull_request.user.type != 'Bot' &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'),
               github.event.pull_request.author_association)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write # Required to post review comments.
      issues: read # Required to read issue context via MCP tools.
      actions: read # Required to read workflow run context via MCP tools.
    steps:
      - uses: mozilla/actions/claude-review@a0ac5cff697f78934b98cb04d21228e061641a94 # v1.0.8
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }} # zizmor: ignore[secrets-outside-env] Trusted collaborators skip the environment gate by design.

  claude-review-untrusted:
    name: Claude Code Review
    if: >-
      !github.event.pull_request.draft &&
      github.event.pull_request.user.type != 'Bot' &&
      !contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'),
                github.event.pull_request.author_association)
    environment: claude-review
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write # Required to post review comments.
      issues: read # Required to read issue context via MCP tools.
      actions: read # Required to read workflow run context via MCP tools.
    steps:
      - uses: mozilla/actions/claude-review@a0ac5cff697f78934b98cb04d21228e061641a94 # v1.0.8
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
