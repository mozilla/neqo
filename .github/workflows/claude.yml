name: Claude Code Review

on:
  # Use pull_request_target to allow secrets access for fork PRs.
  # CI only runs after manual approval for neqo, for non-members of the repo.
  pull_request_target: # zizmor: ignore[dangerous-triggers] See rationale above.
    branches: ["main"]
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  claude-review-trusted:
    name: Claude Code Review
    if: >-
      !github.event.pull_request.draft &&
      github.event.pull_request.user.type != 'Bot' &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'),
               github.event.pull_request.author_association)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write # Required to post review comments.
    steps:
      # Sparse-checkout the local composite action from the base branch.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions/claude-review
          persist-credentials: false
      - uses: ./.github/actions/claude-review
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }} # zizmor: ignore[secrets-outside-env] Trusted collaborators skip the environment gate by design.

  claude-review-untrusted:
    name: Claude Code Review
    if: >-
      !github.event.pull_request.draft &&
      github.event.pull_request.user.type != 'Bot' &&
      !contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'),
                github.event.pull_request.author_association)
    environment: claude-review
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write # Required to post review comments.
    steps:
      # Sparse-checkout the local composite action from the base branch.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions/claude-review
          persist-credentials: false
      - uses: ./.github/actions/claude-review
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
