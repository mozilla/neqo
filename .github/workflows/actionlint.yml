name: Lint GitHub Actions workflows
on:
  push:
    branches: ["main"]
    paths: [".github/**"]
  pull_request:
    paths: [".github/**"]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    uses: mozilla/actions/.github/workflows/actionlint.yml@73612e8bbaf7c3053d8a97bb273c47a812017863 # v1.1.1
    permissions:
      contents: read
      security-events: write # Required for zizmor to upload SARIF results.
