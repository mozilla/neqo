name: Lint GitHub Actions workflows
on:
  push:
    branches: ["main"]
    paths: [".github/**"]
  pull_request:
    paths: [".github/**"]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    uses: mozilla/actions/.github/workflows/actionlint.yml@312d300af3fb2b6551389bf1cb40b10e86294ec2 # v1.1.4
    permissions:
      contents: read
      security-events: write # Required for zizmor to upload SARIF results.
