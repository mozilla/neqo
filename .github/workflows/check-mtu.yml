name: CI MTU
on:
  workflow_dispatch:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-netns:
    name: Network namespace tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - uses: mozilla/actions/rust@b6b1031d2072eb8c2b181887cb5e194ebcc5caab # v1.0.4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run network namespace tests
        run: sudo -E env "PATH=$PATH" cargo test --package mtu --test netns -- --nocapture

  generate-bindings:
    name: Generate ${{ matrix.os }} bindings
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-24.04
            header: linux.h
            args: --allowlist-type 'rtattr|rtmsg|ifinfomsg|nlmsghdr'
          - os: macos
            runner: macos-15
            header: bsd.h
            args: --allowlist-type 'rt_msghdr|rt_metrics|if_data' --allowlist-item 'RTAX_MAX|RTM_GET|RTM_VERSION|RTA_DST|RTA_IFP'
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
      - name: Install bindgen-cli
        run: cargo install bindgen-cli --locked
      - name: Generate bindings
        env:
          OS: ${{ matrix.os }}
          ARGS: ${{ matrix.args }}
          HEADER: ${{ matrix.header }}
        run: |
          echo "::group::Generated bindings for $OS"
          bindgen $ARGS --generate-cstr --explicit-padding --with-derive-default "mtu/src/bindings/$HEADER"
          echo "::endgroup::"


  check-android:
    name: Check Android
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        target:
          [
            "x86_64-linux-android",
            "i686-linux-android",
            "aarch64-linux-android",
          ]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/check-android
        with:
          target: ${{ matrix.target }}
          working-directory: mtu
          github-token: ${{ secrets.GITHUB_TOKEN }}

  check-vm:
    name: Run checks for VM-only platforms
    runs-on: ubuntu-24.04
    # TODO: Restore `environment: codecov` once GitHub supports filtering deployment messages.
    # environment: codecov
    strategy:
      fail-fast: false
      matrix:
        os: [freebsd, openbsd, netbsd, solaris]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/check-vm
        with:
          working-directory: mtu
          platform: ${{ matrix.os }}
          codecov-token: ${{ secrets.CODECOV_TOKEN }} # zizmor: ignore[secrets-outside-env]
          generate-bindings: true

