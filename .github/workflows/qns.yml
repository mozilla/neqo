name: QNS
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  workflow_dispatch:
  schedule:
    # Run at 1 AM each day, so the interop-runner has a current image
    - cron: '0 1 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DELIM: ' vs. '
  TIMEOUT: 20

jobs:
  docker-image:
    name: Build Docker image ${{ matrix.name }}
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - name: pr
            ref: ''
            tag: 'neqo-pr'
            condition: true
          - name: main
            ref: ${{ github.event.pull_request.base.sha }}
            tag: 'neqo-main'
            condition: ${{ github.event_name == 'pull_request' }}
        exclude:
          # Exclude main for non-PR events
          - condition: false
    outputs:
      pr-artifact: ${{ steps.set-outputs.outputs.pr-artifact }}
      main-artifact: ${{ steps.set-outputs.outputs.main-artifact }}
      pr-tag: ${{ steps.set-outputs.outputs.pr-tag }}
      main-tag: ${{ steps.set-outputs.outputs.main-tag }}
    permissions:
      packages: write # This permission is required to push to GitHub Container Registry.
    steps:
      - if: ${{ github.event_name != 'pull_request' }}
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        with:
          platforms: arm64
          cache-image: false

      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
        with:
          cache-binary: false

      - uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - uses: ./.github/actions/docker-build-qns
        id: docker-build
        with:
          ref: ${{ matrix.ref }}
          tag: ${{ matrix.tag }}
          push: ${{ github.event_name != 'pull_request' }}
          platforms: ${{ github.event_name != 'pull_request' && 'linux/amd64, linux/arm64' || 'linux/amd64' }}

      - id: set-outputs
        env:
          STEPS_DOCKER_BUILD_OUTPUTS_ARTIFACT_NAME: ${{ steps.docker-build.outputs.artifact-name }}
          MATRIX_NAME: ${{ matrix.name }}
          MATRIX_TAG: ${{ matrix.tag }}
        run: |
          echo "${MATRIX_NAME}-artifact=${STEPS_DOCKER_BUILD_OUTPUTS_ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
          echo "${MATRIX_NAME}-tag=${MATRIX_TAG}" >> "$GITHUB_OUTPUT"

  implementations:
    name: Determine interop pairs
    if: ${{ github.event_name != 'push' }}
    needs: docker-image
    runs-on: ubuntu-24.04
    outputs:
      pairs: ${{ steps.config.outputs.pairs }}
      implementations: ${{ steps.config.outputs.implementations }}
    env:
      URL: https://github.com/mozilla/neqo
      ROLE: both
    steps:
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: ${{ needs.docker-image.outputs.pr-artifact }}
          path: /tmp

      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        if: ${{ github.event_name == 'pull_request' }}
        with:
          name: ${{ needs.docker-image.outputs.main-artifact }}
          path: /tmp

      - run: |
          # The tar file name is based on the tag from the matrix
          docker load --input "/tmp/${NEEDS_DOCKER_IMAGE_OUTPUTS_PR_TAG}.tar"
          PR_IMAGE=$(docker images --format "{{.Repository}}:{{.Tag}}" | head -1)
          echo "PR_IMAGE=$PR_IMAGE" >> "$GITHUB_ENV"
        env:
          NEEDS_DOCKER_IMAGE_OUTPUTS_PR_TAG: ${{ needs.docker-image.outputs.pr-tag }}

      - if: ${{ github.event_name == 'pull_request' }}
        run: |
          # The tar file name is based on the tag from the matrix
          docker load --input "/tmp/${NEEDS_DOCKER_IMAGE_OUTPUTS_MAIN_TAG}.tar"
          MAIN_IMAGE=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep main | head -1)
          echo "MAIN_IMAGE=$MAIN_IMAGE" >> "$GITHUB_ENV"
        env:
          NEEDS_DOCKER_IMAGE_OUTPUTS_MAIN_TAG: ${{ needs.docker-image.outputs.main-tag }}

      - id: config
        run: |
          # Add some non-default implementations
          # tquic: https://github.com/quic-interop/quic-interop-runner/pull/385/files
          # openssl: https://github.com/quic-interop/quic-interop-runner/pull/402/files
          # linuxquic: https://github.com/quic-interop/quic-interop-runner/pull/428
          cat <<EOF > additional.json
          {
            "neqo-pr": {
              "image": "$PR_IMAGE",
              "url": "$URL",
              "role": "$ROLE"
            },
            "tquic": {
              "image": "tquicgroup/tquic:latest",
              "url": "https://github.com/Tencent/tquic/",
              "role": "both"
            },
            "openssl": {
              "image": "quay.io/openssl-ci/openssl-quic-interop",
              "url": "https://github.com/openssl/openssl",
              "role": "client"
            },
            "linuxquic": {
              "image": "quay.io/lxin/linuxquic-interop:latest",
              "url": "https://github.com/lxin/quic",
              "role": "both"
            }
          }
          EOF

          if [ -n "$MAIN_IMAGE" ]; then
            cat <<EOF > neqo-main.json
            {
              "neqo-main": {
                "image": "$MAIN_IMAGE",
                "url": "$URL",
                "role": "$ROLE"
              }
            }
          EOF
            jq '. += input' neqo-main.json additional.json > temp.json
            mv temp.json additional.json
          fi

          # Merge all implementations
          curl -o runner.json https://raw.githubusercontent.com/quic-interop/quic-interop-runner/master/implementations.json
          jq '. += input' runner.json additional.json > implementations.json
          {
            echo "implementations<<EOF"
            cat implementations.json
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          # For PRs, generate pairs for both neqo-pr and neqo-main
          # For non-PRs, only generate pairs for neqo-pr
          if [ -n "$MAIN_IMAGE" ]; then
            # PR case: pairs for both neqo-pr and neqo-main
            jq < implementations.json "[
                [to_entries[] | select(.value.role==\"server\" or .value.role==\"both\").key] as \$servers |
                [to_entries[] | select(.value.role==\"client\" or .value.role==\"both\").key] as \$clients |
                \$clients[] as \$client |
                \$servers[] as \$server |
                \$client + \"$DELIM\" + \$server |
                select(contains(\"neqo-pr\") or contains(\"neqo-main\"))
              ]" > pairs.json
          else
            # Non-PR case: only pairs for neqo-pr
            jq < implementations.json "[
                [to_entries[] | select(.value.role==\"server\" or .value.role==\"both\").key] as \$servers |
                [to_entries[] | select(.value.role==\"client\" or .value.role==\"both\").key] as \$clients |
                \$clients[] as \$client |
                \$servers[] as \$server |
                \$client + \"$DELIM\" + \$server |
                select(contains(\"neqo-pr\"))
              ]" > pairs.json
          fi

          {
            echo "pairs<<EOF"
            cat pairs.json
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  run-qns:
    name: Run QNS
    if: ${{ github.event_name != 'push' }}
    needs: [docker-image, implementations]
    strategy:
      fail-fast: false
      matrix:
        pair: ${{ fromJson(needs.implementations.outputs.pairs) }}
    runs-on: ubuntu-24.04
    steps:
      # quic-interop-runner requires Docker v28.1. GitHub's ubuntu-24.04 comes
      # with v28.0.4. Install newer version.
      - name: Set up Docker
        uses: docker/setup-docker-action@efe9e3891a4f7307e689f2100b33a155b900a608 # v4.5.0
        with:
          version: 'v28.1.0'

      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: ${{ needs.docker-image.outputs.pr-artifact }}
          path: /tmp

      - run: docker load --input "/tmp/${NEEDS_DOCKER_IMAGE_OUTPUTS_PR_TAG}.tar"
        env:
          NEEDS_DOCKER_IMAGE_OUTPUTS_PR_TAG: ${{ needs.docker-image.outputs.pr-tag }}

      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        if: ${{ github.event_name == 'pull_request' && contains(matrix.pair, 'neqo-main') }}
        with:
          name: ${{ needs.docker-image.outputs.main-artifact }}
          path: /tmp

      - if: ${{ github.event_name == 'pull_request' && contains(matrix.pair, 'neqo-main') }}
        run: docker load --input "/tmp/${NEEDS_DOCKER_IMAGE_OUTPUTS_MAIN_TAG}.tar"
        env:
          NEEDS_DOCKER_IMAGE_OUTPUTS_MAIN_TAG: ${{ needs.docker-image.outputs.main-tag }}

      - id: depair
        env:
          PAIR: ${{ matrix.pair }}
        run: |
          PAIR="${PAIR/$DELIM/%}"
          echo "client=$(echo "$PAIR" | cut -d% -f1)" >> "$GITHUB_OUTPUT"
          echo "server=$(echo "$PAIR" | cut -d% -f2)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          persist-credentials: false

      # TODO: Replace once https://github.com/quic-interop/quic-interop-runner/pull/356 is merged.
      - uses: ./.github/actions/quic-interop-runner
        timeout-minutes: ${{ fromJSON(env.TIMEOUT) }}
        continue-on-error: true
        id: run
        with:
          client: ${{ steps.depair.outputs.client }}
          server: ${{ steps.depair.outputs.server }}
          implementations: ${{ needs.implementations.outputs.implementations }}

      - if: ${{ always() }}
        env:
          RESULT: ${{ steps.run.outputs.result }}
        run: test "$RESULT" != "error"

  report:
    name: Report results
    if: ${{ !cancelled() && github.event_name != 'push' }}
    needs: [docker-image, run-qns, implementations]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          persist-credentials: false
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          pattern: '*results'
          path: results

      - run: sudo apt-get install -y --no-install-recommends wdiff
      - env:
          PAIRS: ${{ needs.implementations.outputs.pairs }}
          IS_PR: ${{ github.event_name == 'pull_request' }}
          PR: ${{ needs.docker-image.outputs.pr-tag }}
          MAIN: ${{ needs.docker-image.outputs.main-tag }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # shellcheck disable=SC2153
          mapfile -t LIST < <(echo "$PAIRS" | jq '.[]' | sort)

          # For PRs, we'll build a map of baseline results from neqo-main
          if [ "$IS_PR" == "true" ]; then
            declare -A BASELINE_MAP
            for PREFIX in "${LIST[@]}"; do
              PREFIX=$(echo "$PREFIX" | tr -d '"')
              if [[ "$PREFIX" == *"neqo-main"* ]]; then
                CLIENT=$(echo "$PREFIX" | cut -f1 -d " ")
                SERVER=$(echo "$PREFIX" | cut -f3 -d " ")
                # Create equivalent neqo-pr pair key
                if [ "$CLIENT" == "neqo-main" ]; then
                  KEY="$PR $DELIM $SERVER"
                  ROLE=client
                else
                  KEY="$CLIENT $DELIM $PR"
                  ROLE=server
                fi
                BASELINE_MAP["$KEY,$ROLE"]="results/${PREFIX} results"
              fi
            done
          fi

          for PREFIX in "${LIST[@]}"; do
            PREFIX=$(echo "$PREFIX" | tr -d '"')
            # Skip neqo-main results as they're only used as baseline
            [[ "$PREFIX" == *"neqo-main"* ]] && [ "$IS_PR" == "true" ] && continue

            CLIENT=$(echo "$PREFIX" | cut -f1 -d " ")
            SERVER=$(echo "$PREFIX" | cut -f3 -d " ")
            if [ "$CLIENT" == "$PR" ]; then
              ROLE=client
            else
              ROLE=server
            fi
            RUN="results/${PREFIX} results"
            PAIR="$CLIENT $DELIM $SERVER"
            if [ ! -e "$RUN/result.json" ]; then
              echo "* $PAIR: run cancelled after $TIMEOUT min" >> "$ROLE.failed.md"
              continue
            fi
            jq < "$RUN/result.json" '
                . as $data |
                .results[][].result //= "failed" |
                {
                  results: [.results[] | group_by(.result)[] | {(.[0].result): [.[] | .abbr]}] |
                  add
                } |
                . + {log_url: $data.log_url}
              ' > "$RUN/$ROLE.grouped.json"
            for ROLE in client server; do
              [ ! -e "$RUN/$ROLE.grouped.json" ] && continue
              for GROUP in $(jq -r < "$RUN/$ROLE.grouped.json" '.results | keys[]'); do
                RESULT=$(jq < "$RUN/$ROLE.grouped.json" -r '.results.'"$GROUP"'[]' | fmt -w 1000)
                LOG=$(jq -r < "$RUN/$ROLE.grouped.json" -r '.log_url')
                BASELINE=$(mktemp)

                # Get baseline from neqo-main if PR, otherwise no baseline
                if [ "$IS_PR" == "true" ] && [ -n "${BASELINE_MAP["$PAIR,$ROLE"]:-}" ]; then
                  BASELINE_DIR="${BASELINE_MAP["$PAIR,$ROLE"]}"
                  if [ -e "$BASELINE_DIR/$ROLE.grouped.json" ]; then
                    jq < "$BASELINE_DIR/$ROLE.grouped.json" -r '.results.'"$GROUP"'[]' | fmt -w 1000 > "$BASELINE"
                  else
                    touch "$BASELINE"
                  fi
                else
                  touch "$BASELINE"
                fi

                [ -n "$RESULT" ] || continue
                DIFF=$(wdiff -n "$BASELINE" - <<< "$RESULT" || true)
                if [ "$GROUP" == "failed" ]; then
                  ADD=":warning:"
                  ADD_DELIM="\*\*"
                  DEL=":rocket:"
                  DEL_DELIM="~~"
                elif [ "$GROUP" == "succeeded" ]; then
                  ADD=":rocket:"
                  ADD_DELIM="~~"
                  DEL=":warning:"
                  DEL_DELIM="\*\*"
                else
                  ADD=""
                  ADD_DELIM=""
                  DEL=""
                  DEL_DELIM=""
                fi
                RESULT=$(echo "$DIFF" | sed -E "s/\[-/ $DEL$DEL_DELIM/g; s/-\]/$DEL_DELIM /g; s/\{\+/ $ADD$ADD_DELIM/g; s/\+\}/$ADD_DELIM /g")
                echo "* [$PAIR]($LOG): $RESULT" >> "$ROLE.$GROUP.md"
              done
            done
          done
          {
            echo "### Failed Interop Tests"
            if [ -e client.failed.md ] || [ -e server.failed.md ]; then
              echo -n "[QUIC Interop Runner](https://github.com/quic-interop/quic-interop-runner), *client* vs. *server*"
              if [ "$IS_PR" == "true" ]; then
                echo ", differences relative to base branch at ${SHA}."
              else
                echo "."
              fi
              echo
              echo "#### $PR as client"
              cat client.failed.md || echo
              echo "#### $PR as server"
              cat server.failed.md || echo
            else
              echo -n "None "
              if [ -e "client.succeeded.md" ] || [ -e "server.succeeded.md" ] || [ -e "client.unsupported.md" ] || [ -e "server.unsupported.md" ]; then
                echo ":tada:"
              else
                echo ":question:"
              fi
            fi
            echo "<details><summary>All results</summary>"
            echo
            for GROUP in succeeded unsupported; do
              echo "### ${GROUP^} Interop Tests"
              if [ -e "client.$GROUP.md" ] || [ -e "server.$GROUP.md" ]; then
                echo "[QUIC Interop Runner](https://github.com/quic-interop/quic-interop-runner), *client* vs. *server*"
                echo "#### $PR as client"
                cat "client.$GROUP.md"
                echo "#### $PR as server"
                cat "server.$GROUP.md"
              else
                echo "None :question:"
              fi
            done
            echo
            echo "</details>"
          } >> comment.md

      - uses: ./.github/actions/pr-comment-data-export
        with:
          name: ${{ github.workflow }}
          contents: comment.md
