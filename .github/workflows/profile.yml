name: Profile
on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTUP_TOOLCHAIN: stable
  TRANSFER_SIZE: 33554432 # 32 MiB
  PERF_OPT: record -F2999 --call-graph fp -e cycles:u,cycles:k,kmem:rss_stat,sched:sched_switch -m 2048
  CARGO_PROFILE_RELEASE_LTO: true
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  bench-matrix:
    name: Determine bench matrix and refs
    runs-on: ubuntu-24.04
    outputs:
      benches: ${{ steps.matrix.outputs.all }}
      # Only profile the baseline (PR base branch) on pull requests
      refs: ${{ steps.refs.outputs.refs }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - id: matrix
        uses: ./.github/actions/bench-matrix
      - id: refs
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            echo "refs=[{\"name\":\"pr\",\"sha\":\"$HEAD_SHA\"},{\"name\":\"base\",\"sha\":\"$BASE_SHA\"}]" >> "$GITHUB_OUTPUT"
          else
            echo 'refs=[{"name":"pr","sha":""}]' >> "$GITHUB_OUTPUT"
          fi

  build-quiche:
    name: Build cloudflare/quiche
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/quic-build
        with:
          impl: quiche
          token: ${{ secrets.GITHUB_TOKEN }}
          artifact-name: quiche-binaries

  bench-profile:
    name: Profile ${{ matrix.bench.bench }} (${{ matrix.ref.name }})
    runs-on: ubuntu-24.04
    needs: bench-matrix
    if: ${{ needs.bench-matrix.outputs.benches != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        bench: ${{ fromJson(needs.bench-matrix.outputs.benches) }}
        ref: ${{ fromJson(needs.bench-matrix.outputs.refs) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ matrix.ref.sha }}

      - uses: mozilla/actions/rust@c7f9db3409fff64a55f16ac0cacbc4cdd05ae435 # v1.1.19
        with:
          version: stable
          tools: samply
          token: ${{ secrets.GITHUB_TOKEN }}
          sccache: true

      - id: nss-version
        uses: ./.github/actions/minimum-version
        with:
          directory: .
      - uses: mozilla/actions/nss@c7f9db3409fff64a55f16ac0cacbc4cdd05ae435 # v1.1.19
        with:
          minimum-version: ${{ steps.nss-version.outputs.minimum }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build benchmark
        env:
          CRATE: ${{ matrix.bench.crate }}
          BENCH: ${{ matrix.bench.bench }}
          REF: ${{ matrix.ref.name }}
        run: |
          mkdir -p binaries
          if cargo bench --locked --package "$CRATE" --features bench --bench "$BENCH" --no-run 2>&1 | tee bench-build.txt; then
            BENCH_BIN=$(grep Executable bench-build.txt | cut -d'(' -f2 | cut -d')' -f1)
            cp "$BENCH_BIN" "binaries/$BENCH"
          elif [ "$REF" = "base" ]; then
            # The bench may not exist on the base ref if it's new in this PR.
            echo "::warning::Bench $BENCH not found on base ref; skipping."
          else
            exit 1
          fi

      - name: Enable perf
        run: sudo sysctl -w kernel.perf_event_paranoid=-1

      - name: Run benchmark with perf
        env:
          BENCH: ${{ matrix.bench.bench }}
        run: |
          if [ -f "binaries/$BENCH" ]; then
            # shellcheck disable=SC2086
            perf $PERF_OPT -o "$BENCH.perf" -- "binaries/$BENCH" --bench --noplot || true
          fi

      - name: Process with samply
        env:
          BENCH: ${{ matrix.bench.bench }}
        run: |
          if [ -f "$BENCH.perf" ]; then
            samply import "$BENCH.perf" -o "$BENCH.samply.json.gz" --save-only --presymbolicate || true
          fi

      - name: Upload profile
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bench-${{ matrix.bench.crate }}-${{ matrix.bench.bench }}-${{ matrix.ref.name }}
          path: |
            *.samply.json.gz
            binaries
          retention-days: 90
          if-no-files-found: ignore

  perfcompare-profile:
    name: Profile ${{ matrix.combo.client }}-${{ matrix.combo.server }} (${{ matrix.ref.name }})
    runs-on: ubuntu-24.04
    needs: [bench-matrix, build-quiche]
    strategy:
      fail-fast: false
      matrix:
        combo:
          - { client: neqo, server: neqo }
          - { client: neqo, server: quiche }
          - { client: quiche, server: neqo }
        ref: ${{ fromJson(needs.bench-matrix.outputs.refs) }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ matrix.ref.sha }}

      - uses: mozilla/actions/rust@c7f9db3409fff64a55f16ac0cacbc4cdd05ae435 # v1.1.19
        with:
          version: stable
          tools: samply
          token: ${{ secrets.GITHUB_TOKEN }}
          sccache: true

      - id: nss-version
        uses: ./.github/actions/minimum-version
        with:
          directory: .
      - uses: mozilla/actions/nss@c7f9db3409fff64a55f16ac0cacbc4cdd05ae435 # v1.1.19
        with:
          minimum-version: ${{ steps.nss-version.outputs.minimum }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build neqo
        run: |
          cargo build --locked --release --features bench --bin neqo-client --bin neqo-server
          mkdir -p binaries
          cp target/release/neqo-client target/release/neqo-server binaries/

      - name: Download cloudflare/quiche
        if: matrix.combo.client == 'quiche' || matrix.combo.server == 'quiche'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: quiche-binaries
          path: binaries

      - name: Fix binary permissions
        run: chmod +x binaries/*

      - name: Calculate perf size
        run: echo "PERF_SIZE=$((TRANSFER_SIZE * 20))" >> "$GITHUB_ENV"

      - name: Setup test environment
        uses: ./.github/actions/testdata-setup
        with:
          sizes: ${{ env.PERF_SIZE }}

      - name: Generate commands
        id: commands
        uses: ./.github/actions/perfcompare-commands
        with:
          client: ${{ matrix.combo.client }}
          server: ${{ matrix.combo.server }}
          size: ${{ env.PERF_SIZE }}

      - name: Set command environment
        env:
          BENCH_NAME: ${{ steps.commands.outputs.bench-name }}
          SERVER_CMD: ${{ steps.commands.outputs.server-cmd }}
          CLIENT_CMD: ${{ steps.commands.outputs.client-cmd }}
        run: |
          {
            echo "BENCH_NAME=$BENCH_NAME"
            echo "SERVER_CMD=$SERVER_CMD"
            echo "CLIENT_CMD=$CLIENT_CMD"
          } >> "$GITHUB_ENV"

      - name: Enable perf
        run: sudo sysctl -w kernel.perf_event_paranoid=-1

      - name: Record server perf
        run: |
          # shellcheck disable=SC2086
          perf $PERF_OPT -o "$BENCH_NAME.server.perf" -- $SERVER_CMD &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          sleep 1

      - name: Record client perf
        working-directory: /tmp
        run: |
          # shellcheck disable=SC2086
          perf $PERF_OPT -o "$BENCH_NAME.client.perf" -- $CLIENT_CMD || true

      - name: Stop server
        if: always()
        run: kill "$SERVER_PID" 2>/dev/null || true

      - name: Collect and process perf data
        run: |
          mkdir -p profiles
          for role in server client; do
            f="$BENCH_NAME.$role.perf"
            [ -f "$f" ] || f="/tmp/$f"
            [ -f "$f" ] || continue
            echo "Processing $f..."
            samply import "$f" -o "profiles/$BENCH_NAME.$role.samply.json.gz" --save-only --presymbolicate || true
          done

      - name: Upload profiles
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: perfcompare-${{ matrix.combo.client }}-${{ matrix.combo.server }}-${{ matrix.ref.name }}
          path: |
            profiles/*.samply.json.gz
            binaries
          retention-days: 90
          if-no-files-found: ignore

  pr-comment:
    name: PR Comment
    needs: [bench-profile, perfcompare-profile]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Generate comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          ARTIFACTS=$(gh api "/repos/$REPOSITORY/actions/runs/$RUN_ID/artifacts" \
            --jq '.artifacts | map(select(.name | test("^bench-|^perfcompare-"))) | sort_by([(.name | sub("-(pr|base)$"; "")), (.name | endswith("-pr") | not)]) | .[] | "- [\(.name)](\(.archive_download_url | sub("api.github.com/repos"; "github.com") | sub("/zip"; "")))"')
          {
            echo "### Performance Profiles"
            echo
            if [ -n "$ARTIFACTS" ]; then
              echo "Performance profiles for [profiler.firefox.com](https://profiler.firefox.com/):"
              echo
              echo "$ARTIFACTS"
            else
              echo "No performance profiles were generated."
            fi
          } > results.md

      - uses: ./.github/actions/pr-comment-data-export
        with:
          name: ${{ github.workflow }}
          contents: results.md
