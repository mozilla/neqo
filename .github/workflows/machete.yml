name: Machete
on:
  workflow_dispatch:
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  machete:
    uses: mozilla/actions/.github/workflows/machete.yml@b6b1031d2072eb8c2b181887cb5e194ebcc5caab # v1.0.4
