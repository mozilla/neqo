name: Machete
on:
  workflow_dispatch:
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  machete:
    uses: mozilla/actions/.github/workflows/machete.yml@7cca521fd0ace71bc6ee830c4a98297023e3402b # v1.1.18
