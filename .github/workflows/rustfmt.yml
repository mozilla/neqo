name: Format
on:
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    uses: mozilla/actions/.github/workflows/rustfmt.yml@c7f9db3409fff64a55f16ac0cacbc4cdd05ae435 # v1.1.19
