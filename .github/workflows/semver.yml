name: Check semver
on:
  workflow_dispatch:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  semver:
    uses: mozilla/actions/.github/workflows/semver.yml@66a0665e8ea4b3ba7a8fd010b791f56625d6a932 # v1.0.11
    with:
      package: mtu
