name: Check semver
on:
  workflow_dispatch:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  semver:
    uses: mozilla/actions/.github/workflows/semver.yml@27cbe8fb5d338c2861b787e5de10410559065db1 # v1.1.3
    with:
      package: mtu
