name: Check semver
on:
  workflow_dispatch:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  semver:
    uses: mozilla/actions/.github/workflows/semver.yml@25cb84d060946c0ad6d2c3f79da479b16d180d71 # v1.1.0
    with:
      package: mtu
