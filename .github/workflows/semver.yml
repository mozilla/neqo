name: Check semver
on:
  workflow_dispatch:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  semver:
    uses: mozilla/actions/.github/workflows/semver.yml@b6b1031d2072eb8c2b181887cb5e194ebcc5caab # v1.0.4
    with:
      package: mtu
