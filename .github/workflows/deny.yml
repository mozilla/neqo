name: Deny
on:
  workflow_dispatch:
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deny:
    uses: mozilla/actions/.github/workflows/deny.yml@25cb84d060946c0ad6d2c3f79da479b16d180d71 # v1.1.0
