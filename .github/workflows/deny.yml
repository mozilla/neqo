name: Deny
on:
  workflow_dispatch:
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deny:
    uses: mozilla/actions/.github/workflows/deny.yml@c7f9db3409fff64a55f16ac0cacbc4cdd05ae435 # v1.1.19
